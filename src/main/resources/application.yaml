server:
  port: 9001
  tomcat:
    connection-timeout: 2s
    keep-alive-timeout: 15s
    threads:
      max: 50
      min-spare: 5

spring:
  application:
    name: schedule-service
  config:
    import: "optional:configserver:" #Maybe have to change optional as well if you follow below comment, test first
  cloud:
    config:
      uri: http://localhost:8888
      request-connect-timeout: 5000
      request-read-timeout: 5000
      fail-fast: false #Set to true if we don't want our service to work while the config service is down
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
  datasource: #This is where we can easily change what database is connected to our schedule service
    username: user
    password: password
    url: jdbc:postgresql://localhost:5432/mytvdb_schedule
    hikari:
      connection-timeout: 2000
      maximum-pool-size: 5

management:
  endpoints:
    web:
      exposure:
        include: refresh

mytv:
  greeting: (Local) Welcome to the schedule service!
